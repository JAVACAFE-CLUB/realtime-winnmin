spring:
  application:
    name: rtw-index

  # ===== Data 설정 (MongoDB, Redis) =====
  data:
    # MongoDB (풀텍스트 조회용)
    mongodb:
      uri: mongodb://rtw_app:rtw_password123@localhost:27017/realtime_winnmin?authSource=realtime_winnmin&minPoolSize=10&maxPoolSize=100&maxWaitTimeMS=5000
      database: realtime_winnmin
    # Redis (키워드 캐싱)
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 2000ms

  # ===== Elasticsearch 설정 =====
  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 30s

  # ===== Cache 설정 =====
  cache:
    type: redis
    redis:
      time-to-live: 86400000  # 24시간 (밀리초)
      cache-null-values: false

# ===== Kafka 설정 =====
kafka:
  bootstrap-servers: localhost:9092

# ===== 애플리케이션 설정 =====
app:
  kafka:
    # 소비할 토픽 (정제 시스템에서 발행)
    input-topics:
      - refined-rss
      - refined-wiki
      - refined-twitter

    # Consumer 튜닝 (초당 1000건 처리 목표)
    consumer:
      group-id: rtw-index-group
      # 한 번의 poll()에서 가져올 최대 레코드 수
      max-poll-records: 500
      # poll() 간격 최대 시간 (이 시간 초과 시 리밸런싱)
      max-poll-interval-ms: 300000  # 5분
      # 세션 타임아웃
      session-timeout-ms: 45000     # 45초
      # 하트비트 간격
      heartbeat-interval-ms: 15000  # 15초
      # 최소 fetch 바이트 (배치 효율성)
      fetch-min-bytes: 50000        # 50KB
      # fetch 대기 시간
      fetch-max-wait-ms: 500        # 500ms
      # 동시 처리 컨슈머 수 (파티션 수에 맞춤)
      concurrency: 3
      # 오프셋 자동 커밋 비활성화 (수동 배치 커밋)
      enable-auto-commit: false
      # 오프셋 리셋 전략
      auto-offset-reset: earliest

  # ===== Elasticsearch 인덱스 설정 =====
  elasticsearch:
    # 문서 인덱스
    article-index:
      name: rtw-articles
      shards: 3
      replicas: 1
      refresh-interval: 5s
    # 키워드 인덱스
    keyword-index:
      name: rtw-keywords
      shards: 1
      replicas: 0
    # Bulk 설정
    bulk:
      size: 500           # 배치당 문서 수
      flush-interval: 5s  # 강제 flush 간격
      concurrent-requests: 2

  # ===== 형태소 분석 설정 =====
  morpheme:
    # 분석기 타입
    analyzer: korean_noun_only
    # 최소 키워드 길이
    min-keyword-length: 2
    # 최대 키워드 길이
    max-keyword-length: 20
    # 문서당 최대 추출 키워드 수
    max-keywords-per-doc: 50

  # ===== 오늘의 키워드 설정 =====
  keyword:
    # Top N 키워드
    top-count: 10
    # 캐시 키 prefix
    cache-prefix: "rtw:keyword:daily:"
    # 캐시 TTL (초)
    cache-ttl: 86400  # 24시간
    # 집계 스케줄 (cron)
    aggregation-cron: "0 0 * * * *"  # 매 시간 정각

  # ===== 처리 설정 =====
  processing:
    # 병렬 처리 수
    parallelism: 30
    # 처리 타임아웃 (초)
    timeout-seconds: 60

# ===== 서버 설정 =====
server:
  port: 8083

# ===== 로깅 설정 =====
logging:
  level:
    root: INFO
    com.javacafe.rtwindex: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.elasticsearch: INFO
    org.springframework.data.mongodb: INFO
    org.springframework.data.redis: DEBUG  # Redis 디버깅
    io.lettuce.core: INFO
    org.elasticsearch.client: WARN

# ===== Actuator 설정 =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  health:
    # Elasticsearch reactive health indicator 비활성화 (버전 호환성 이슈)
    elasticsearch:
      enabled: false
    redis:
      enabled: true
