spring:
  application:
    name: rtw-collector
  data:
    # ===== MongoDB 설정 =====
    mongodb:
      host: localhost
      port: 27017
      database: realtime_winnmin
      username: rtw_app
      password: rtw_password123
      authentication-database: realtime_winnmin
      # MongoDB Auto-index 생성 (개발 환경에서만 true)
      auto-index-creation: true
server:
  port: 8081

# ===== 저장소 타입 선택 =====
storage:
  type: mongodb  # file 또는 mongodb (기본값: file)

  # 파일 저장 설정
  file:
    directory: /Users/usmin/RtwOriginData

# ===== 로깅 설정 =====
logging:
  level:
    org.springframework.data.mongodb: DEBUG  # MongoDB 쿼리 로그
