# Prometheus 설정
# Kafka Exporter 메트릭 수집

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'realtime-winnmin'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']
        labels:
          instance: 'kafka'
          service: 'kafka-exporter'
    scrape_timeout: 10s
    scrape_interval: 15s
