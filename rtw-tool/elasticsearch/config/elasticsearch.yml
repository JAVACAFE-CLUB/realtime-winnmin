# 클러스터 설정
cluster.name: "es-docker-cluster"
node.name: "elasticsearch"

# 네트워크 설정
network.host: 0.0.0.0
http.port: 9200

# 디스커버리 설정 (단일 노드)
discovery.type: single-node

# 보안 설정 비활성화 (개발용)
xpack.security.enabled: false

